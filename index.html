<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scioly Astronomy Converter</title>
<style>
body{font-family:Arial;background:#0b0f1a;color:white;margin:0;padding:20px}
h1{color:#60a5fa}
section{margin-bottom:40px;padding:20px;background:#111827;border-radius:10px}
input,select,button{margin:5px;padding:6px;border-radius:6px;border:none}
button{background:#2563eb;color:white;cursor:pointer}
button:hover{background:#1d4ed8}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #374151;padding:6px}
th{background:#1f2937}
</style>
</head>
<body>

<h1>🌌 Scioly Astronomy Converter</h1>

<section>
<h2>Unit Converter</h2>
<select id="category">
<option value="distance">Distance</option>
<option value="mass">Mass</option>
<option value="time">Time</option>
<option value="velocity">Velocity</option>
</select>
<input type="number" id="inputValue" placeholder="Value">
<select id="fromUnit"></select>
<select id="toUnit"></select>
<button onclick="convert()">Convert</button>
<h3 id="result"></h3>
</section>

<section>
<h2>Constants</h2>
<table>
<tr><th>Name</th><th>Value</th></tr>
<tr><td>Speed of Light</td><td>2.998e8 m/s</td></tr>
<tr><td>Gravitational Constant</td><td>6.674e-11</td></tr>
<tr><td>Solar Mass</td><td>1.989e30 kg</td></tr>
<tr><td>Astronomical Unit</td><td>1.496e11 m</td></tr>
<tr><td>Parsec</td><td>3.086e16 m</td></tr>
</table>
</section>

<section>
<h2>Binary Star – Kepler's 3rd Law</h2>
<p>P² = 4π²a³ / G(M₁+M₂)</p>
<input type="number" id="a" placeholder="Semi-major axis (m)">
<input type="number" id="M1" placeholder="Mass 1 (kg)">
<input type="number" id="M2" placeholder="Mass 2 (kg)">
<button onclick="binary()">Solve for Period</button>
<h3 id="binaryResult"></h3>
</section>

<script>
const G=6.674e-11;

const units={
distance:{m:1,km:1000,AU:1.496e11,ly:9.461e15,pc:3.086e16},
mass:{kg:1,g:0.001,Msun:1.989e30},
time:{s:1,yr:3.154e7},
velocity:{ms:1,kms:1000}
};

function loadUnits(){
const cat=document.getElementById("category").value;
const from=document.getElementById("fromUnit");
const to=document.getElementById("toUnit");
from.innerHTML="";to.innerHTML="";
for(let u in units[cat]){
from.innerHTML+=`<option>${u}</option>`;
to.innerHTML+=`<option>${u}</option>`;
}
}
loadUnits();
document.getElementById("category").addEventListener("change",loadUnits);

function convert(){
const cat=document.getElementById("category").value;
const val=parseFloat(document.getElementById("inputValue").value);
const from=document.getElementById("fromUnit").value;
const to=document.getElementById("toUnit").value;
const base=val*units[cat][from];
const result=base/units[cat][to];
document.getElementById("result").innerText=result;
}

function binary(){
const a=parseFloat(document.getElementById("a").value);
const M1=parseFloat(document.getElementById("M1").value);
const M2=parseFloat(document.getElementById("M2").value);
const P=Math.sqrt((4*Math.PI*Math.PI*a*a*a)/(G*(M1+M2)));
document.getElementById("binaryResult").innerText="Period = "+P+" seconds";
}
</script>

</body>
</html>
